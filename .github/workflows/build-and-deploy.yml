name: Build Firmware & Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  plan-firmware-release:
    runs-on: ubuntu-latest
    outputs:
      firmware_changed: ${{ steps.plan.outputs.firmware_changed }}
      has_arduino: ${{ steps.plan.outputs.has_arduino }}
      has_pio: ${{ steps.plan.outputs.has_pio }}
      arduino_matrix: ${{ steps.plan.outputs.arduino_matrix }}
      pio_matrix: ${{ steps.plan.outputs.pio_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed example files
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          git fetch origin gh-pages:refs/remotes/origin/gh-pages --depth=1 || true

          if ! git cat-file -e origin/gh-pages:firmware/versions.json 2>/dev/null; then
            find examples -type f | sort > changed-files.txt
          elif [ "$before" = "0000000000000000000000000000000000000000" ]; then
            git diff-tree --no-commit-id --name-only -r "$after" -- \
              examples/ \
              .github/scripts/firmware_release.py \
              .github/workflows/build-and-deploy.yml > changed-files.txt || true
          else
            git diff --name-only "$before" "$after" -- \
              examples/ \
              .github/scripts/firmware_release.py \
              .github/workflows/build-and-deploy.yml > changed-files.txt || true
          fi

          echo "Changed example files:"
          cat changed-files.txt || true

      - name: Build firmware release plan
        id: plan
        run: |
          set -euo pipefail
          args=()
          while IFS= read -r changed_file; do
            [ -n "$changed_file" ] || continue
            args+=(--changed-file "$changed_file")
          done < changed-files.txt

          python3 .github/scripts/firmware_release.py plan \
            "${args[@]}" \
            --output-file firmware-release-plan.json

      - name: Upload firmware release plan
        uses: actions/upload-artifact@v4
        with:
          name: release-plan
          path: firmware-release-plan.json
          retention-days: 30

  build-arduino-firmware:
    needs: plan-firmware-release
    if: needs.plan-firmware-release.outputs.has_arduino == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sketch: ${{ fromJSON(needs.plan-firmware-release.outputs.arduino_matrix).include }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache compiled firmware
        id: cache
        uses: actions/cache@v4
        with:
          path: ./build/${{ matrix.sketch.name }}/
          key: firmware-arduino-v3-${{ matrix.sketch.name }}-${{ hashFiles(format('{0}/**', matrix.sketch.path)) }}

      - name: Install arduino-cli
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=$HOME/.local/bin sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install ESP32 board package
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.7

      - name: Install Seeed_GFX library
        if: steps.cache.outputs.cache-hit != 'true' && matrix.sketch.needs_gfx
        run: |
          arduino-cli config set library.enable_unsafe_install true
          arduino-cli lib install --git-url https://github.com/Seeed-Studio/Seeed_GFX.git

      - name: Install Sensirion SHT4x library
        if: steps.cache.outputs.cache-hit != 'true' && matrix.sketch.needs_sht4x
        run: arduino-cli lib install "Sensirion I2C SHT4x"

      - name: Install OpenFontRender library
        if: steps.cache.outputs.cache-hit != 'true' && matrix.sketch.needs_open_font_render
        run: |
          arduino-cli config set library.enable_unsafe_install true
          arduino-cli lib install --git-url https://github.com/takkaO/OpenFontRender.git

      - name: Install Seeed_GxEPD2 and Adafruit_GFX
        if: steps.cache.outputs.cache-hit != 'true' && matrix.sketch.needs_gxepd2
        run: |
          arduino-cli config set library.enable_unsafe_install true
          arduino-cli lib install --git-url https://github.com/Seeed-Projects/Seeed_GxEPD2.git
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit BusIO"

      - name: Compile firmware
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          BUILD_FLAGS="${{ matrix.sketch.build_flags }}"
          arduino-cli compile \
            --fqbn "esp32:esp32:XIAO_ESP32S3:FlashSize=8M,PartitionScheme=default_8MB,PSRAM=opi" \
            ${BUILD_FLAGS:+--build-property "build.extra_flags=$BUILD_FLAGS"} \
            --output-dir ./build/${{ matrix.sketch.name }} \
            ./${{ matrix.sketch.path }}
          cp ~/.arduino15/packages/esp32/hardware/esp32/*/tools/partitions/boot_app0.bin \
            ./build/${{ matrix.sketch.name }}/boot_app0.bin

          if [ -n "${{ matrix.sketch.spiffs_image_size }}" ]; then
            MKSPIFFS=$(find ~/.arduino15/packages/esp32/tools -path "*/mkspiffs/*/mkspiffs" -print -quit)
            if [ -z "$MKSPIFFS" ]; then
              echo "::error::mkspiffs not found"
              exit 1
            fi
            "$MKSPIFFS" \
              -c ./${{ matrix.sketch.path }}/data \
              -p 256 \
              -b 4096 \
              -s "${{ matrix.sketch.spiffs_image_size }}" \
              ./build/${{ matrix.sketch.name }}/${{ matrix.sketch.name }}.spiffs.bin
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.sketch.name }}
          path: build/${{ matrix.sketch.name }}/
          retention-days: 30

  build-platformio-firmware:
    needs: plan-firmware-release
    if: needs.plan-firmware-release.outputs.has_pio == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sketch: ${{ fromJSON(needs.plan-firmware-release.outputs.pio_matrix).include }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache compiled firmware
        id: cache
        uses: actions/cache@v4
        with:
          path: ./build/${{ matrix.sketch.name }}/
          key: firmware-pio-v4-${{ matrix.sketch.name }}-${{ hashFiles(format('{0}/**', matrix.sketch.path), '.github/scripts/firmware_release.py', '.github/workflows/build-and-deploy.yml') }}

      - name: Set up Python
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        if: steps.cache.outputs.cache-hit != 'true'
        run: pip install platformio

      - name: Build firmware
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cd ${{ matrix.sketch.path }}
          pio run -e ${{ matrix.sketch.pio_env }}

          BUILD_DIR=".pio/build/${{ matrix.sketch.pio_env }}"
          OUT_DIR="${GITHUB_WORKSPACE}/build/${{ matrix.sketch.name }}"
          mkdir -p "$OUT_DIR"

          cp "$BUILD_DIR/firmware.bin" "$OUT_DIR/${{ matrix.sketch.name }}.ino.bin"
          cp "$BUILD_DIR/bootloader.bin" "$OUT_DIR/${{ matrix.sketch.name }}.ino.bootloader.bin"
          cp "$BUILD_DIR/partitions.bin" "$OUT_DIR/${{ matrix.sketch.name }}.ino.partitions.bin"
          if [ -f "$BUILD_DIR/littlefs.bin" ]; then
            cp "$BUILD_DIR/littlefs.bin" "$OUT_DIR/${{ matrix.sketch.name }}.spiffs.bin"
          elif [ -f "$BUILD_DIR/spiffs.bin" ]; then
            cp "$BUILD_DIR/spiffs.bin" "$OUT_DIR/${{ matrix.sketch.name }}.spiffs.bin"
          elif [ -n "${{ matrix.sketch.filesystem_image_url }}" ]; then
            curl -fsSL -o "$OUT_DIR/${{ matrix.sketch.name }}.spiffs.bin" \
              "${{ matrix.sketch.filesystem_image_url }}"
          elif [ "${{ matrix.sketch.spiffs_offset }}" != "0" ]; then
            echo "::error::Missing filesystem image for ${{ matrix.sketch.name }}"
            exit 1
          fi

          BOOT_APP0=$(find ~/.platformio -name "boot_app0.bin" -print -quit)
          if [ -z "$BOOT_APP0" ]; then
            echo "::warning::boot_app0.bin not found locally, downloading from ESP32 Arduino core"
            curl -fsSL -o "$OUT_DIR/boot_app0.bin" \
              https://github.com/espressif/arduino-esp32/raw/refs/heads/master/tools/partitions/boot_app0.bin
          else
            cp "$BOOT_APP0" "$OUT_DIR/boot_app0.bin"
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.sketch.name }}
          path: build/${{ matrix.sketch.name }}/
          retention-days: 30

  deploy-pages-and-release:
    needs:
      - plan-firmware-release
      - build-arduino-firmware
      - build-platformio-firmware
    if: >-
      always() &&
      needs.plan-firmware-release.result == 'success' &&
      needs.build-arduino-firmware.result != 'cancelled' &&
      needs.build-platformio-firmware.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: source

      - name: Download firmware release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: source

      - name: Download changed firmware artifacts
        if: needs.plan-firmware-release.outputs.firmware_changed == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          path: source/firmware-artifacts

      - name: Checkout gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p pages
          cd pages
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git switch --create gh-pages FETCH_HEAD
          else
            git switch --orphan gh-pages
          fi

      - name: Prepare Pages content and release assets
        id: prepare
        run: |
          set -euo pipefail
          mkdir -p source/firmware-artifacts release-assets
          python3 source/.github/scripts/firmware_release.py prepare-pages \
            --plan-file source/firmware-release-plan.json \
            --pages-dir pages \
            --artifacts-dir source/firmware-artifacts \
            --web-dir source/web \
            --release-assets-dir release-assets \
            --release-notes release-notes.md

      - name: Package EEZ Studio project template
        run: |
          set -euo pipefail
          mkdir -p pages/downloads
          cd source
          zip -r ../pages/downloads/EEZStudio.zip examples/official/EEZStudio/ \
            -x "examples/official/EEZStudio/.pio/*" \
            -x "examples/official/EEZStudio/.DS_Store"

      - name: Commit and push gh-pages
        run: |
          set -euo pipefail
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No Pages changes to commit"
          else
            git commit -m "chore: deploy firmware hub"
            git push origin gh-pages
          fi

      - name: Create full firmware release
        if: steps.prepare.outputs.release_ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.prepare.outputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.prepare.outputs.release_title }}" \
            --notes-file release-notes.md \
            release-assets/*

      - name: GitHub Pages branch source note
        run: echo "Configure GitHub Pages to serve from the gh-pages branch in repository settings."
