; Shared configuration for the reTerminal E-series (XIAO ESP32S3 core).
; Each device env below extends this and adds its own device flag.
[reterminal_base]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-esp32-s3-sense
framework = arduino
upload_speed = 115200
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
extra_scripts = pre:scripts/ensure_deps.py
build_flags =
    -D BOARD_HAS_PSRAM
    -I src
lib_deps = https://github.com/Seeed-Studio/Seeed_GFX

[env:reterminal_e1001]
extends = reterminal_base
build_flags =
    ${reterminal_base.build_flags}
    -D VOICE_MEMO_DEVICE_E1001

[env:reterminal_e1002]
extends = reterminal_base
build_flags =
    ${reterminal_base.build_flags}
    -D VOICE_MEMO_DEVICE_E1002

[env:reterminal_e1003]
extends = reterminal_base
build_flags =
    ${reterminal_base.build_flags}
    -D VOICE_MEMO_DEVICE_E1003

; Chinese (Simplified) build for the E1003. Renders through OpenFontRender with
; the TTF embedded in the firmware (scripts/gen_font.py -> src/FontZH.h), so it
; flashes in one step like the other envs (no SPIFFS / uploadfs needed).
[env:reterminal_e1001_zh]
extends = reterminal_base
build_flags =
    ${reterminal_base.build_flags}
    -D VOICE_MEMO_DEVICE_E1001
    -D VM_UI_LANG_ZH
lib_deps =
    ${reterminal_base.lib_deps}
    https://github.com/takkaO/OpenFontRender.git
extra_scripts =
    pre:scripts/ensure_deps.py
    pre:scripts/gen_font.py

[env:reterminal_e1002_zh]
extends = reterminal_base
build_flags =
    ${reterminal_base.build_flags}
    -D VOICE_MEMO_DEVICE_E1002
    -D VM_UI_LANG_ZH
lib_deps =
    ${reterminal_base.lib_deps}
    https://github.com/takkaO/OpenFontRender.git
extra_scripts =
    pre:scripts/ensure_deps.py
    pre:scripts/gen_font.py

[env:reterminal_e1003_zh]
extends = reterminal_base
build_flags =
    ${reterminal_base.build_flags}
    -D VOICE_MEMO_DEVICE_E1003
    -D VM_UI_LANG_ZH
lib_deps =
    ${reterminal_base.lib_deps}
    https://github.com/takkaO/OpenFontRender.git
extra_scripts =
    pre:scripts/ensure_deps.py
    pre:scripts/gen_font.py

[env:native]
platform = native
build_flags =
    -std=c++11
    -I src
