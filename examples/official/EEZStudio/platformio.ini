[platformio]
default_envs = E1001

; ── shared settings ──────────────────────────────────────────
[env]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_8MB.csv
monitor_speed = 115200
extra_scripts = pre:pre_build.py

build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    -I src/ui

lib_deps =
    lvgl/lvgl@^9.2
    https://github.com/Seeed-Studio/Seeed_GFX.git

; ── per-model environments ───────────────────────────────────
; E1001 : 7.5"  BW     800 x 480   UC8179
[env:E1001]
build_flags = ${env.build_flags} -DBOARD_SCREEN_COMBO=520

; E1002 : 7.5"  Color  800 x 480   ED2208
[env:E1002]
build_flags = ${env.build_flags} -DBOARD_SCREEN_COMBO=521

; E1003 : 10.3" BW     1872 x 1404 IT8951 (TCON)
[env:E1003]
build_flags = ${env.build_flags} -DBOARD_SCREEN_COMBO=522

; E1004 : 13.3" Color  1200 x 1600 T133A01
[env:E1004]
build_flags = ${env.build_flags} -DBOARD_SCREEN_COMBO=523
